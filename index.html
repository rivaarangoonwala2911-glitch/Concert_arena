<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quest 3 Hand-Tracking Arena</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script>
        // --- LOCOMOTION ENGINE ---
        AFRAME.registerComponent('pinch-move', {
            init: function () {
                this.rig = document.querySelector('#rig');
                this.camera = document.querySelector('#head');
                this.isPinching = false;
                this.speed = 0.1;

                // Native WebXR Hand Events
                this.el.addEventListener('pinchstarted', () => { this.isPinching = true; });
                this.el.addEventListener('pinchended', () => { this.isPinching = false; });
            },
            tick: function () {
                if (this.isPinching) {
                    const dir = new THREE.Vector3();
                    this.camera.object3D.getWorldDirection(dir);
                    dir.y = 0; // Maintain terrestrial constraints
                    dir.reverse(); // Standardize forward vector
                    this.rig.object3D.position.add(dir.multiplyScalar(this.speed));
                }
            }
        });

        // --- INTERACTION ENGINE ---
        AFRAME.registerComponent('pinch-select', {
            init: function () {
                this.el.addEventListener('pinchstarted', () => {
                    const ray = this.el.components.raycaster;
                    if (ray && ray.intersectedEls.length > 0) {
                        ray.intersectedEls[0].emit('click');
                    }
                });
            }
        });
    </script>
</head>
<body>
    <a-scene webxr="optionalFeatures: hand-tracking, local-floor; referenceSpaceType: local-floor">
        
        <a-entity id="rig" position="0 0 15">
            <a-camera id="head" position="0 1.6 0"></a-camera>
            
            <a-entity id="leftHand" hand-tracking-controls="hand: left" pinch-move>
                <a-sphere radius="0.02" color="red" position="0 0.05 0"></a-sphere> 
            </a-entity>

            <a-entity id="rightHand" hand-tracking-controls="hand: right" pinch-select raycaster="objects: .clickable; far: 3; showLine: true">
                <a-sphere radius="0.02" color="blue" position="0 0.05 0"></a-sphere>
            </a-entity>
        </a-entity>

        <a-plane position="0 0 0" rotation="-90 0 0" width="50" height="50" color="#111"></a-plane>

        <a-entity id="entrance" position="0 0 5">
            <a-torus radius="4" radius-tubular="0.2" color="#ff4500"></a-torus>
            <a-text value="CONCERT ARENA" position="0 5 0" align="center" width="10"></a-text>
        </a-entity>

        <a-box id="kiosk" class="clickable" position="-3 0.75 8" width="1" height="1.5" depth="0.5" color="#333"
               onclick="this.setAttribute('color', 'green')">
            <a-text value="PINCH TO ACTIVATE" position="0 1 0.3" align="center" width="2"></a-text>
        </a-box>

        <a-light type="ambient" intensity="0.3"></a-light>
        <a-light type="point" position="0 5 -5" color="orange" intensity="2"></a-light>
    </a-scene>
</body>
</html>
