<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quest 3 VR Arena - Hand Tracking & Locomotion</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-blink-controls@0.4.3/dist/aframe-blink-controls.min.js"></script>
    <script src="https://unpkg.com/super-hands@3.0.4/dist/super-hands.min.js"></script>

    <script>
        window.AppState = { hasTicket: false, hasWristband: false, securityCleared: false };

        // --- GESTURE LOCOMOTION COMPONENT ---
        AFRAME.registerComponent('hand-locomotion', {
            init: function () {
                this.rig = document.querySelector('#rig');
                this.camera = document.querySelector('#head');
                this.isPinching = false;
                this.speed = 0.1;
                
                this.el.addEventListener('pinchstarted', () => { this.isPinching = true; });
                this.el.addEventListener('pinchended', () => { this.isPinching = false; });
            },
            tick: function () {
                if (this.isPinching) {
                    const direction = new THREE.Vector3();
                    this.camera.object3D.getWorldDirection(direction);
                    direction.y = 0; // Keep movement on the floor
                    direction.normalize();
                    
                    // Move the rig forward based on camera facing direction
                    const velocity = direction.multiplyScalar(this.speed);
                    this.rig.object3D.position.add(velocity);
                }
            }
        });

        // Interaction Mapper
        AFRAME.registerComponent('pinch-to-click', {
            init: function () {
                this.el.addEventListener('pinchstarted', () => {
                    const raycaster = this.el.components.raycaster;
                    if (raycaster && raycaster.intersectedEls.length > 0) {
                        raycaster.intersectedEls[0].emit('click');
                    }
                });
            }
        });

        // App Logic (Ticket/Wristband/Security)
        AFRAME.registerComponent('app-manager', {
            tick: function () {
                const hudText = document.querySelector('#hud-text');
                if (hudText) {
                    let status = "Status:\n";
                    status += AppState.hasTicket ? "[X] Ticket\n" : "[ ] Get Ticket\n";
                    status += AppState.hasWristband ? "[X] Wristband\n" : "[ ] Get Wristband\n";
                    status += AppState.securityCleared ? "[X] Arena Access" : "[ ] Clear Security";
                    hudText.setAttribute('value', status);
                }
            }
        });

        AFRAME.registerComponent('kiosk-interact', {
            init: function () {
                this.el.addEventListener('click', () => {
                    if (!AppState.hasTicket) {
                        AppState.hasTicket = true;
                        this.el.setAttribute('color', '#00ff00');
                        this.el.querySelector('a-text').setAttribute('value', 'TICKET\nISSUED');
                    }
                });
            }
        });

        AFRAME.registerComponent('wristband-interact', {
            init: function () {
                this.el.addEventListener('click', () => {
                    if (AppState.hasTicket && !AppState.hasWristband) {
                        AppState.hasWristband = true;
                        this.el.setAttribute('color', '#00ff00');
                        document.querySelector('#wristband-visual').setAttribute('visible', 'true');
                    }
                });
            }
        });

        AFRAME.registerComponent('security-scanner', {
            init: function () {
                this.el.addEventListener('click', () => {
                    if (AppState.hasWristband) {
                        AppState.securityCleared = true;
                        document.querySelector('#security-indicator').setAttribute('color', '#00ff00');
                        document.querySelector('#security-gate').setAttribute('animation', 'property: position; to: 2 1.5 0; dur: 1000; easing: easeOutQuad');
                    }
                });
            }
        });
    </script>
</head>
<body>

    <a-scene app-manager webxr="optionalFeatures: hand-tracking, local-floor" renderer="antialias: true; colorManagement: true;">
        
        <a-assets>
            <a-mixin id="interactive" class="clickable collidable"></a-mixin>
        </a-assets>

        <a-entity id="rig" position="0 0 18">
            <a-camera id="head" position="0 1.6 0"></a-camera>

            <a-entity id="left-hand" hand-tracking-controls="hand: left" hand-locomotion>
                <a-entity id="wrist-hud" position="0.05 0.05 0.05" rotation="-90 90 0" scale="0.1 0.1 0.1">
                    <a-plane width="1.5" height="1" color="#111" opacity="0.8"></a-plane>
                    <a-text id="hud-text" value="Status:\nInitializing..." position="-0.65 0.2 0.01" width="3" color="#00ff00"></a-text>
                </a-entity>
            </a-entity>

            <a-entity id="right-hand" hand-tracking-controls="hand: right" pinch-to-click raycaster="objects: .clickable; far: 2; showLine: true">
                <a-entity id="wristband-visual" visible="false" position="0 0 0.05">
                    <a-torus radius="0.04" radius-tubular="0.01" color="#00ffff" material="emissive: #00ffff; emissiveIntensity: 2"></a-torus>
                </a-entity>
            </a-entity>
        </a-entity>

        <a-plane position="0 0 -5" rotation="-90 0 0" width="50" height="50" color="#1a1a1a" class="collidable"></a-plane>

        <a-entity id="main-entrance" position="0 0 12">
            <a-torus radius="4" radius-tubular="0.4" color="#ff3300" material="emissive: #ff1100"></a-torus>
            <a-text value="WELCOME TO THE ARENA" position="0 5.5 0" align="center" width="10" color="#fff"></a-text>
        </a-entity>

        <a-entity position="-3 0 10" rotation="0 45 0">
            <a-box position="0 0.75 0" width="0.8" height="1.5" depth="0.5" color="#333" class="collidable"></a-box>
            <a-plane position="0 1.2 0.26" width="0.6" height="0.4" color="#222" mixin="interactive" kiosk-interact>
                <a-text value="GET\nTICKET" align="center" position="0 0 0.01" width="3" color="#fff"></a-text>
            </a-plane>
        </a-entity>

        <a-entity position="3 0 8" rotation="0 -45 0">
            <a-cylinder position="0 0.5 0" radius="0.5" height="1" color="#224" class="collidable"></a-cylinder>
            <a-cylinder position="0 1.05 0" radius="0.4" height="0.1" color="#448" mixin="interactive" wristband-interact>
                <a-text value="GET\nWRISTBAND" align="center" position="0 0.1 0" rotation="-90 0 0" width="2" color="#fff"></a-text>
            </a-cylinder>
        </a-entity>

        <a-entity position="0 0 5">
            <a-box position="-4 1 0" width="6" height="2" depth="0.2" color="#111"></a-box>
            <a-box position="4 1 0" width="6" height="2" depth="0.2" color="#111"></a-box>
            <a-entity position="-0.5 0 0">
                <a-box id="security-gate" position="0.5 1.5 0" width="1" height="3" depth="0.1" color="#444" opacity="0.8" mixin="interactive" security-scanner></a-box>
                <a-sphere id="security-indicator" position="0.5 3.2 0" radius="0.2" color="#ffff00"></a-sphere>
            </a-entity>
        </a-entity>

        <a-entity id="stage" position="0 0 -15">
            <a-cylinder position="0 0.5 0" radius="6" height="1" color="#111"></a-cylinder>
            <a-entity animation="property: rotation; to: 0 0 360; loop: true; dur: 20000; easing: linear">
                <a-torus radius="5" radius-tubular="0.2" position="0 3 -2" rotation="45 0 0" color="#ff0055" material="emissive: #ff0055"></a-torus>
                <a-torus radius="6" radius-tubular="0.15" position="0 3 -3" rotation="-45 0 0" color="#00ffcc" material="emissive: #00ffcc"></a-torus>
            </a-entity>
        </a-entity>

        <a-light type="ambient" color="#222"></a-light>
        <a-light type="point" position="0 8 -10" color="#ff5500" intensity="2"></a-light>

    </a-scene>
</body>
</html>
